<div class="actions">{% if init_status == "failed" %}<form method="post" action="{% url 'reinit-project' project.slug %}" onsubmit="return confirm('Инициализация проекта не удалась — запустить повторную?')">{% csrf_token %}<button class="button secondary">Переинициализировать</button></form>{% endif %}<a class="button" href="{% url 'project-update' project.slug %}">Настройки</a><span class="status {{ init_status }}">{{ init_label }}</span></div>
