services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: docgen
      POSTGRES_USER: docgen
      POSTGRES_PASSWORD: ${PG_PASSWORD?PG_PASSWORD not set}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docgen"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/', timeout=5)\""]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s
    environment:
      DOCGEN_DB_ENGINE: django.db.backends.postgresql
      DOCGEN_DB_NAME: docgen
      DOCGEN_DB_USER: docgen
      DOCGEN_DB_PASSWORD: ${PG_PASSWORD}
      DOCGEN_DB_HOST: db
      DOCGEN_DB_PORT: "5432"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY?DJANGO_SECRET_KEY not set}
      DOCGEN_ALLOWED_HOSTS: ${DOCGEN_ALLOWED_HOSTS:-*}
      DOCGEN_WORKSPACE_ROOT: /app/workspaces
      DOCGEN_DEBUG: "1"
    volumes:
      - workspaces:/app/workspaces
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    entrypoint: python3 manage.py docgen_worker
    restart: unless-stopped
    environment:
      DOCGEN_DB_ENGINE: django.db.backends.postgresql
      DOCGEN_DB_NAME: docgen
      DOCGEN_DB_USER: docgen
      DOCGEN_DB_PASSWORD: ${PG_PASSWORD}
      DOCGEN_DB_HOST: db
      DOCGEN_DB_PORT: "5432"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DOCGEN_WORKSPACE_ROOT: /app/workspaces
      DOCGEN_DEBUG: "${DOCGEN_DEBUG:-0}"
    volumes:
      - workspaces:/app/workspaces
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_healthy

volumes:
  pgdata:
  workspaces:
